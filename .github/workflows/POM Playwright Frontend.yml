name: POM Playwright Frontend

on:
  schedule:
    - cron: "30 3 * * 1-5"   # 9:00 AM IST (3:30 AM UTC)

  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - qa
          - demo

jobs:
  ui-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 240          # 6 flows × 10min/test + breaks; keep headroom

    environment:
      name: ${{ inputs.environment || 'qa' }}

    env:
      TEST_ENV: ${{ inputs.environment || 'qa' }}
      CI: true

      CITIZEN_USERNAME: ${{ vars.CITIZEN_USERNAME }}
      CITIZEN_PASSWORD: ${{ vars.CITIZEN_PASSWORD }}
      LITIGENT_USERNAME: ${{ vars.LITIGENT_USERNAME }}
      LITIGENT_PASSWORD: ${{ vars.LITIGENT_PASSWORD }}
      NAYAMITRA_USERNAME: ${{ vars.NAYAMITRA_USERNAME }}
      NAYAMITRA_PASSWORD: ${{ vars.NAYAMITRA_PASSWORD }}
      FSO_USERNAME: ${{ vars.FSO_USERNAME }}
      FSO_PASSWORD: ${{ vars.FSO_PASSWORD }}
      JUDGE_USERNAME: ${{ vars.JUDGE_USERNAME }}
      JUDGE_PASSWORD: ${{ vars.JUDGE_PASSWORD }}

    defaults:
      run:
        working-directory: ui-e2e    # all `run:` steps execute inside ui-e2e/

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui-e2e/package-lock.json   # lock file is in ui-e2e/

      - name: Install Node dependencies
        run: npm ci                                          # runs inside ui-e2e/

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('ui-e2e/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium     # only chromium needed

      - name: Verify Playwright installation
        run: npx playwright --version

      - name: Run UI E2E Flows Sequentially
        run: node tests/flows/run-all-flows.js               # relative to ui-e2e/

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ env.TEST_ENV }}
          path: ui-e2e/playwright-report/                   # correct path from repo root
          retention-days: 7
