name: POM Playwright Frontend

on:
  schedule:
    - cron: "30 1 * * 1-5"   # 9:00 AM IST (3:30 AM UTC)

  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - demo
          - uat

jobs:
  ui-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    environment:
      name: ${{ inputs.environment || 'demo' }}

    env:
      TEST_ENV: ${{ inputs.environment || 'demo' }}
      CI: true

      CITIZEN_USERNAME: ${{ vars.CITIZEN_USERNAME }}
      CITIZEN_PASSWORD: ${{ vars.CITIZEN_PASSWORD }}
      LITIGENT_USERNAME: ${{ vars.LITIGENT_USERNAME }}
      LITIGENT_PASSWORD: ${{ vars.LITIGENT_PASSWORD }}
      NAYAMITRA_USERNAME: ${{ vars.NAYAMITRA_USERNAME }}
      NAYAMITRA_PASSWORD: ${{ vars.NAYAMITRA_PASSWORD }}
      FSO_USERNAME: ${{ vars.FSO_USERNAME }}
      FSO_PASSWORD: ${{ vars.FSO_PASSWORD }}
      JUDGE_USERNAME: ${{ vars.JUDGE_USERNAME }}
      JUDGE_PASSWORD: ${{ vars.JUDGE_PASSWORD }}

            # VPN credentials (used only for UAT)
      EVPN_USERNAME: ${{ secrets.EVPN_USERNAME }}
      EVPN_PASSWORD: ${{ secrets.EVPN_PASSWORD }}
      HOSTS_ENTRIES: ${{ secrets.HOSTS_ENTRIES }}


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Verify Playwright installation
        run: npx playwright --version


      # =========================
      # UAT ONLY - VPN SETUP
      # =========================
      - name: Install HySecure VPN Client
        if: ${{ env.TEST_ENV == 'uat' }}
        continue-on-error: true
        run: |
          wget -q https://evpn.kerala.gov.in/fes-bin/public/HySecure_Client_5.1.4.16.deb -O HySecure_Client.deb
          sudo apt install -y ./HySecure_Client.deb

      - name: Update Hosts File from Secret
        if: ${{ env.TEST_ENV == 'uat' }}
        run: |
          echo "${HOSTS_ENTRIES}" | sudo tee -a /etc/hosts
          echo "Hosts file updated"     

      - name: Connect to VPN (HySecure)
        if: ${{ env.TEST_ENV == 'uat' }}
        run: |
          timeout 300s hysecure login \
            --user="${EVPN_USERNAME}" \
            --password="${EVPN_PASSWORD}" \
            --server="evpn.kerala.gov.in" \
            --domain="Default"

      # =========================
 

      - name: Run UI E2E Flows Sequentially
        run: |
          node ui-e2e/tests/flows/run-all-flows.js

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ env.TEST_ENV }}
          path: playwright-report/
          retention-days: 7

      
      # =========================
      # UAT ONLY - VPN LOGOUT
      # =========================
      - name: Logout From VPN (HySecure)
        if: ${{ env.TEST_ENV == 'uat' }}
        continue-on-error: true
        run: |
          hysecure logout --user="${EVPN_USERNAME}"
